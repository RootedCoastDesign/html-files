<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Page Not Found — Rooted Coast Design</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#00100A;color:#F5F0E8;font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem}
.card{max-width:480px;width:100%;background:rgba(10,22,40,0.90);border:1px solid rgba(0,200,255,0.15);border-radius:12px;padding:3rem 2.5rem;text-align:center}
.icon{font-size:3rem;margin-bottom:1.25rem;display:block}
.eyebrow{font-size:.72rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#00C87A;margin-bottom:.75rem;display:block}
h1{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:700;color:#D8E8EE;margin-bottom:.65rem}
p{font-size:.9rem;color:rgba(245,240,232,0.6);line-height:1.7;margin-bottom:1.75rem}
.btn-row{display:flex;gap:.75rem;justify-content:center;flex-wrap:wrap}
.btn{display:inline-block;background:#00C87A;color:#00100A;font-weight:700;font-size:.85rem;padding:.75rem 1.75rem;border-radius:6px;text-decoration:none;letter-spacing:.04em;text-transform:uppercase}
.btn-outline{display:inline-block;background:transparent;border:1.5px solid rgba(0,200,255,0.35);color:rgba(245,240,232,0.85);font-weight:600;font-size:.85rem;padding:.7rem 1.6rem;border-radius:6px;text-decoration:none;letter-spacing:.04em;text-transform:uppercase}
</style>
</head>
<body>
<div class="card">
  <span class="icon">🌲</span>
  <span class="eyebrow">404</span>
  <h1>Lost in the woods.</h1>
  <p>The page you're looking for doesn't exist or may have moved. Let's get you back on the trail.</p>
  <div class="btn-row">
    <a href="index.html" class="btn">Back to Home</a>
    <a href="contact.html" class="btn-outline">Contact Us</a>
  </div>
</div>
</body>
</html>
