<!DOCTYPE html>
<html lang="en">
<head>

<title>Returning to Cart — Timberland Digital Design</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#00100A;color:#F5F0E8;font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem}

p{font-size:.9rem;color:rgba(245,240,232,0.6);line-height:1.7;margin-bottom:1.75rem}
.btn{display:inline-block;background:#00C87A;color:#00100A;font-weight:700;font-size:.85rem;padding:.75rem 1.75rem;border-radius:6px;text-decoration:none;letter-spacing:.04em;text-transform:uppercase}
</style>
</head>
<body>
<div class="card">
  <span class="icon">↩️</span>
  <h1>No problem.</h1>
  <p>Your cart is still saved. Redirecting you back now…</p>
